<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        text-align: center;
        font-family: Arial, sans-serif;
        margin-top: 50px;
      }

      .bulb-container {
        margin: 20px auto;
      }

      .bulb-container img {
        width: 150px;
        height: auto;
        margin-bottom: 20px;
      }

      .button-container {
        display: flex;
        gap: 20px;
        justify-content: center;
      }

      button {
        padding: 10px 30px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        transition: all 0.3s ease;
      }

      #btnOn {
        background-color: #14ef1f;
        color: white;
      }

      #btnOn:hover {
        background-color: #12b61a;
        transform: scale(1.2);
      }

      #btnOff {
        background-color: #f44336;
        color: white;
      }

      #btnOff:hover {
        background-color: #da190b;
        transform: scale(1.2);
      }
    </style>
  </head>
  <body>
    <div class="bulb-container">
      <img id="bulb" src="./IMAGES/pic_bulboff.gif" alt="" />
    </div>

    <div class="button-container">
      <button id="btnOn">TURN ON</button>
      <button id="btnOff">TURN OFF</button>
    </div>

    <script>
      const bulb = document.getElementById("bulb");

      const bulbOn = document.getElementById("btnOn");
      const bulbOff = document.getElementById("bulbOff");

      // function to turn on bulb
      function turnOff() {
        img.src = "./IMAGES/pic_bulboff.gif";
        console.log("Bulb turned OFF");
      }

      function turnOn() {
        bulb.src = "./IMAGES//pic_bulbon.gif";
        console.log("Bulb turned ON");
      }

      btnOn.onclick = function () {
        bulb.src = "./IMAGES/pic_bulbon.gif";
      };

      btnOff.onclick = function () {
        bulb.src = "./IMAGES/pic_bulboff.gif";
      };
    </script>
  </body>
</html>
